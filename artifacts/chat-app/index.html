<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>DeepSeek Chat</title>
    <meta name="description" content="DeepSeek — AI research sandbox powered by DeepSeek V4." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="DeepSeek Chat" />
    <meta property="og:description" content="DeepSeek — AI research sandbox powered by DeepSeek V4." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DeepSeek Chat" />
    <meta name="twitter:description" content="DeepSeek — AI research sandbox powered by DeepSeek V4." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      #loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;

        position: fixed;
        inset: 0;
        z-index: 9999;

        background: transparent;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
      }

      #loader.visible {
        opacity: 1;
        pointer-events: auto;
      }

      #loader .whale {
        font-size: 48px;
        line-height: 1;
        display: inline-block;
        animation: whale-bob 1.2s ease-in-out infinite;
        user-select: none;
      }

      #loader .whale-label {
        font-size: 13px;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: hsl(220 10% 55%);
        letter-spacing: 0.04em;
      }

      @keyframes whale-bob {
        0%   { transform: translateY(0px)   rotate(-4deg); }
        25%  { transform: translateY(-10px) rotate(0deg);  }
        50%  { transform: translateY(-14px) rotate(4deg);  }
        75%  { transform: translateY(-6px)  rotate(1deg);  }
        100% { transform: translateY(0px)   rotate(-4deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="loader">
      <span class="whale">🐳</span>
      <span class="whale-label">Thinking…</span>
    </div>

    <script>
      function showLoader() {
        document.getElementById('loader').classList.add('visible');
      }
      function hideLoader() {
        document.getElementById('loader').classList.remove('visible');
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
